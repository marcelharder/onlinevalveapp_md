version: '3.1'

services: 

  mariadb:
    image: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
    networks: 
      - internal-container-network  
    volumes:
     - mariadb-data:/var/lib/mysql

  valveinventory:
    image: inventory_md:v4
    ports:
      - 8045:80
    networks: 
      - internal-container-network
    volumes:
     - sqldata:/root/.aspnet/DataProtection-Keys
    depends_on: 
       - mariadb
   
volumes:
  sqldata:
  mariadb-data:

networks:
  internal-container-network:
    driver: bridge