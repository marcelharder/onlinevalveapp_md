<div *ngIf="!displayOVI()">
  <div class="card">
    <div class="card-header">
      <div class="d-flex flex-row">
        <div class="p-2">{{ Title }}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="row">
        <div class="col-sm-6">

          <div class="row">
            <div class="col-sm-12">
              <h5><span class="badge badge-secondary">Choose vendor</span></h5>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6"> <select  [(ngModel)]="selectedVendor"   name="ve"  class="form-control"  >
                <option *ngFor="let an of optionsVendor" [value]="an.value"> {{ an.description }} </option>
              </select>
            </div>
            <div class="col-sm-6">
              <button class="btn btn-warning btn-sm" (click)="Search()">Search</button>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-12">
              <h5><span class="badge badge-secondary">Choose type</span></h5>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6">
              <select [(ngModel)]="selectedType" name="ty" class="form-control">
                <option *ngFor="let an of optionsType" [value]="an.description">
                  {{ an.description }}
                </option>
              </select>
            </div>
            <div class="col-sm-6">
              <button class="btn btn-warning btn-sm" (click)="Search()">
                Search
              </button>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12">
              <div class="row">
                <div class="col-sm-6"><h5><span class="badge badge-secondary">Height</span></h5></div>
                <div class="col-sm-6"><button class="badge badge-success btn-xxs" (click)="info()">?</button></div>
              </div>


            </div>
          </div>
          <div class="row">
            <div class="col-sm-6">
              <select [(ngModel)]="selectedHeight" name="hei" class="form-control">
                <option *ngFor="let an of heightOptions" [value]="an.value">
                  {{ an.description }}
                </option>
              </select>
            </div>
            <div class="col-sm-6">

            </div>
          </div>
          <div class="row">
            <div class="col-sm-12">
              <div class="row">
                <div class="col-sm-6"><h5><span class="badge badge-secondary">Weight</span></h5></div>
                <div class="col-sm-6"><button class="badge badge-success btn-xxs" (click)="info()">?</button></div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6">
              <select [(ngModel)]="selectedWeight" name="wei" class="form-control">
                <option *ngFor="let an of weightOptions" [value]="an.value">
                  {{ an.description }}
                </option>
              </select>
            </div>
            <div class="col-sm-6">

            </div>
          </div>






        </div>
        <div class="col-sm-6">
          <div *ngIf="showProductList()">
            <app-selectValveTypeList
              [pro]="products"
              (selout)="searchDetails($event)"
            ></app-selectValveTypeList>
          </div>
          <div *ngIf="!showProductList()">
              <div class="card">
                <div class="card-header">Valve Type Details</div>
                <div class="card-body">
                  "countries": "NL,SA,US"
                  <table>
                    <tr>
                      <th>size</th>
                      <th></th>
                    </tr>
                    <tr *ngFor="let pro of sizes">
                      <th>
                        <h6>{{ pro.size }}</h6>
                      </th>

                      <td *ngIf="severePPMCCS(pro.ppm)">
                        <a (click)="selectDetails(pro.valveId)">
                          <span class="badge badge-danger">{{
                            pro.ppm
                          }}</span></a
                        >
                      </td>
                      <td *ngIf="nonePPMCCS(pro.ppm)">
                        <a (click)="selectDetails(pro.valveId)">
                          <span class="badge badge-success">{{
                            pro.ppm
                          }}</span></a
                        >
                      </td>
                      <td *ngIf="moderatePPMCCS(pro.ppm)">
                        <a (click)="selectDetails(pro.valveId)">
                          <span class="badge badge-warning">{{
                            pro.ppm
                          }}</span></a
                        >
                      </td>
                    </tr>
                  </table>
                </div>
                <div class="card-footer">
                  <button
                    class="btn btn-info btn-sm"
                    (click)="hideHeightWeight()"
                  >
                    Done
                  </button>
                </div>
              </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="displayOVI()">
  <app-lookInOVI></app-lookInOVI>
</div>

<ng-template #NYHATemplate>
  <div class="modal-header">
    <h4 class="modal-title pull-left">Definition of NYHA</h4>
    <button type="button" class="close pull-right" aria-label="Close" (click)="modalRef.hide()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <p *ngFor="let item of optionsModalNyha">{{item}}</p>
  </div>
</ng-template>
