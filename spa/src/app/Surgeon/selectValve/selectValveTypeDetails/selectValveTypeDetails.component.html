<div class="card">
  <div class="card-header">
    <div class="d-flex">
      <div class="mr-auto p-2"><h4><span class="badge badge-default">Valve Type Details</span></h4></div>
      <div class="p-2"><button class="btn btn-success btn-sm" (click)="showAdditionalInfo()">Additional info</button></div>
    </div>
    
    
    
    
    </div>
  <div class="card-body">

   <div class="row">
     <div class="col-sm-6">
       <div class="row">
         <div class="col-sm-12">
          <h6><span class="badge badge-secondary">Description:</span></h6>
         </div>
       </div>
       <div class="row">
        <div class="col-sm-12">
         <h6><span class="badge badge-default">{{pro.description}}</span></h6>
        </div>
      </div>

      <div class="row">
      <div class="col-sm-12">
       <h6><span class="badge badge-secondary">Type:</span></h6>
      </div>
    </div>
    <div class="row">
     <div class="col-sm-12">
      <h6><span class="badge badge-default">{{pro.type}}</span></h6>
     </div>
   </div>

   <div class="row">
    <div class="col-sm-12">
     <h6><span class="badge badge-secondary">Implant position:</span></h6>
    </div>
  </div>
  <div class="row">
   <div class="col-sm-12">
    <h6><span class="badge badge-default">{{pro.implant_position}}</span></h6>
   </div>
 </div>


     </div>
     <div class="col-sm-6"><img [src]="ImagePath" width="250px" height="200px"></div>
   </div>
    <hr/>
    <table>
      <tr>
        <th><h6><span class="badge badge-secondary">Valve sizes</span></h6></th>
        <th></th>
      </tr>
      <tr *ngFor="let p of pro.valve_size">
        <td><h6>{{ p.size }}</h6></td>
        <td *ngIf="severePPMCCS(p.ppm)">
          <div class="row">
            <div class="col-sm-8"><h6><span class="badge badge-default">The expected patient-prosthesis mismatch is:</span></h6></div>
            <div class="col-sm-4"><button class="btn btn-danger btn-sm">{{p.ppm}}</button></div>
          </div>
          </td>
        <td *ngIf="nonePPMCCS(p.ppm)">
          <div class="row">
            <div class="col-sm-8"><h6><span class="badge badge-default">The expected patient-prosthesis mismatch is:</span></h6></div>
            <div class="col-sm-4"><button class="btn btn-success btn-sm">{{p.ppm}}</button></div>
          </div>
          
        </td>
        <td *ngIf="moderatePPMCCS(p.ppm)">
          <div class="row">
            <div class="col-sm-8"><h6><span class="badge badge-default">The expected patient-prosthesis mismatch is:</span></h6></div>
            <div class="col-sm-4"><button class="btn btn-warning btn-sm">{{p.ppm}}</button></div>
          </div>
        </td>
      </tr>
    </table>
  </div>
  <div class="card-footer">
    <button class="btn btn-info btn-sm" (click)="hideDetails()" > Done </button>
  </div>
</div>
